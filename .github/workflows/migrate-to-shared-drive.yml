# SA Drive容量管理（ゴミ箱空にする / ファイル移行）
name: SA Drive Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: '実行する操作'
        required: true
        type: choice
        options:
          - empty-trash
          - migrate
        default: 'empty-trash'
      dry_run:
        description: 'ドライラン（一覧表示のみ）'
        required: false
        type: boolean
        default: true
      limit:
        description: '移行件数上限（0=全件、migrateのみ）'
        required: false
        type: number
        default: 0

env:
  TZ: 'Asia/Tokyo'

jobs:
  manage:
    name: SA Drive Management
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            zoom
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zoom/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r zoom/requirements.txt

      - name: Run
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHARED_DRIVE_ID: ${{ secrets.SHARED_DRIVE_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            FLAGS="--dry-run"
          fi

          if [ "${{ inputs.action }}" == "empty-trash" ]; then
            FLAGS="$FLAGS --empty-trash"
          else
            LIMIT="${{ inputs.limit }}"
            if [ -n "$LIMIT" ] && [ "$LIMIT" -gt 0 ] 2>/dev/null; then
              FLAGS="$FLAGS --limit $LIMIT"
            fi
          fi

          echo "=== SA Drive管理 (action=${{ inputs.action }}) ==="
          echo "フラグ: $FLAGS"
          python zoom/migrate_to_shared_drive.py $FLAGS
