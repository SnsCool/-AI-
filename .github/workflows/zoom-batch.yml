# Zoom 統合ワークフロー
# バッチ処理・動画アップロード・Webhook分析・テストを統合
name: Zoom Batch Processing

on:
  # 10分ごとに実行（グループ単位で分散処理）
  schedule:
    - cron: '*/10 * * * *'

  # 手動実行
  workflow_dispatch:
    inputs:
      group:
        description: 'グループ番号 (1-6、空欄で全グループ順次実行)'
        required: false
        type: string
        default: ''
      from_date:
        description: '開始日 (YYYY-MM-DD)'
        required: false
        type: string
        default: ''
      to_date:
        description: '終了日 (YYYY-MM-DD)'
        required: false
        type: string
        default: ''
      limit:
        description: '1グループあたりの処理件数上限（0 or 空 = 無制限）'
        required: false
        type: number
        default: 0
      reprocess:
        description: '再処理フラグ（処理済みも再処理）'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run（書き込みなし）'
        required: false
        type: boolean
        default: false
      run_test:
        description: 'テストモード実行'
        required: false
        type: boolean
        default: false

  # Webhook（外部からの分析リクエスト）
  repository_dispatch:
    types: [analyze_meeting]

env:
  TZ: 'Asia/Tokyo'

jobs:
  # マトリクス設定ジョブ
  setup-matrix:
    name: Setup Matrix Strategy
    if: ${{ github.event_name != 'repository_dispatch' && inputs.run_test != true }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should-run: ${{ steps.set-matrix.outputs.should-run }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # cron実行: 現在の分からグループを自動計算
            # 0分→G1, 10分→G2, 20分→G3, 30分→G4, 40分→G5, 50分→G6
            MINUTE=$(TZ=Asia/Tokyo date +%M)
            GROUP=$(( MINUTE / 10 + 1 ))
            echo "matrix={\"group\":[${GROUP}]}" >> $GITHUB_OUTPUT
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Schedule mode: Group ${GROUP}/6 (minute: ${MINUTE})"
          elif [ -z "${{ inputs.group }}" ]; then
            # 手動実行（group未指定）: 全グループ順次実行
            echo "matrix={\"group\":[1,2,3,4,5,6]}" >> $GITHUB_OUTPUT
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Manual mode: All groups"
          else
            # 手動実行（group指定）: 指定グループのみ
            if [[ "${{ inputs.group }}" =~ ^[1-6]$ ]]; then
              echo "matrix={\"group\":[${{ inputs.group }}]}" >> $GITHUB_OUTPUT
              echo "should-run=true" >> $GITHUB_OUTPUT
              echo "Manual mode: Group ${{ inputs.group }}"
            else
              echo "Error: Invalid group number '${{ inputs.group }}'. Must be 1-6."
              echo "should-run=false" >> $GITHUB_OUTPUT
            fi
          fi

  # メイン処理ジョブ
  process:
    name: Process Group ${{ matrix.group }}
    needs: setup-matrix
    if: needs.setup-matrix.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 1
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            zoom
            .github
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zoom/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r zoom/requirements.txt

      - name: Setup Google Credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          umask 077
          if printf '%s' "$GOOGLE_CREDENTIALS_JSON" | base64 -d > /tmp/google_creds.json 2>/dev/null; then
            echo "Credentials decoded from base64."
          else
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" > /tmp/google_creds.json
            echo "Credentials saved as raw JSON."
          fi
          chmod 600 /tmp/google_creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_creds.json" >> $GITHUB_ENV

      - name: Validate Inputs
        id: validate
        run: |
          DATE_REGEX='^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
          FROM_DATE="${{ inputs.from_date }}"
          TO_DATE="${{ inputs.to_date }}"
          if [ -n "$FROM_DATE" ] && ! [[ "$FROM_DATE" =~ $DATE_REGEX ]]; then
            echo "Error: Invalid from_date format. Expected YYYY-MM-DD, got: $FROM_DATE"
            exit 1
          fi
          if [ -n "$TO_DATE" ] && ! [[ "$TO_DATE" =~ $DATE_REGEX ]]; then
            echo "Error: Invalid to_date format. Expected YYYY-MM-DD, got: $TO_DATE"
            exit 1
          fi
          echo "Input validation passed."

      - name: Run Batch Script (Group ${{ matrix.group }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHARED_DRIVE_ID: ${{ secrets.SHARED_DRIVE_ID }}
          GOOGLE_DELEGATE_EMAIL: ${{ secrets.GOOGLE_DELEGATE_EMAIL }}
          PYTHONUNBUFFERED: "1"
        run: |
          CMD=(python zoom/batch_zoom.py --group "${{ matrix.group }}")

          LIMIT="${{ inputs.limit }}"
          if [ -n "$LIMIT" ] && [ "$LIMIT" -gt 0 ] 2>/dev/null; then
            CMD+=(--limit "$LIMIT")
          fi

          if [ -n "${{ inputs.from_date }}" ]; then
            CMD+=(--from-date "${{ inputs.from_date }}")
          fi
          if [ -n "${{ inputs.to_date }}" ]; then
            CMD+=(--to-date "${{ inputs.to_date }}")
          fi

          if [ "${{ inputs.reprocess }}" == "true" ]; then
            CMD+=(--reprocess)
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            CMD+=(--dry-run)
          fi
          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/google_creds.json

  # Webhook分析ジョブ
  webhook-analyze:
    name: Analyze Meeting (Webhook)
    if: ${{ github.event_name == 'repository_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            zoom
            .github
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zoom/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r zoom/requirements.txt

      - name: Analyze Transcript
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRANSCRIPT: ${{ github.event.client_payload.transcript }}
          ASSIGNEE: ${{ github.event.client_payload.assignee }}
          MEETING_DATE: ${{ github.event.client_payload.meeting_date }}
          CUSTOMER_NAME: ${{ github.event.client_payload.customer_name }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "$TRANSCRIPT" > /tmp/transcript.txt
          python zoom/main.py \
            --file /tmp/transcript.txt \
            --assignee "$ASSIGNEE" \
            --date "$MEETING_DATE" \
            --customer "$CUSTOMER_NAME"

  # テストジョブ
  test:
    name: Run Test Mode
    if: ${{ inputs.run_test == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            zoom
            .github
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zoom/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r zoom/requirements.txt

      - name: Run Test Mode
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python zoom/main.py --test

  # 通知ジョブ
  notify:
    name: Notify Results
    needs: [setup-matrix, process, webhook-analyze, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine Job Status
        id: status
        run: |
          # 各ジョブの結果を収集（skippedは無視）
          FAILED=""
          SUCCEEDED=""

          for JOB_NAME in process webhook-analyze test; do
            RESULT=""
            case "$JOB_NAME" in
              process)         RESULT="${{ needs.process.result }}" ;;
              webhook-analyze) RESULT="${{ needs.webhook-analyze.result }}" ;;
              test)            RESULT="${{ needs.test.result }}" ;;
            esac

            if [ "$RESULT" == "failure" ]; then
              FAILED="${FAILED}${JOB_NAME}, "
            elif [ "$RESULT" == "success" ]; then
              SUCCEEDED="${SUCCEEDED}${JOB_NAME}, "
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "failed_jobs=${FAILED%, }" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "failed_jobs=" >> $GITHUB_OUTPUT
          fi
          echo "succeeded_jobs=${SUCCEEDED%, }" >> $GITHUB_OUTPUT

      - name: Send Slack Notification on Failure
        if: steps.status.outputs.status == 'failure' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ Zoom Batch Workflow Failed\\nFailed: ${{ steps.status.outputs.failed_jobs }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            $SLACK_WEBHOOK_URL

      - name: Send Discord Notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LOG_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CURRENT_TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')

          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            FAILED_JOBS="${{ steps.status.outputs.failed_jobs }}"
            TITLE="❌ Zoom 処理エラー"
            DESCRIPTION="一部の処理でエラーが発生しました。\\n\\n**失敗:** ${FAILED_JOBS}"
            COLOR=15158332
            STATUS_ICON="❌"
          else
            TITLE="✅ Zoom 処理完了"
            DESCRIPTION="すべての処理が正常に完了しました。"
            COLOR=3066993
            STATUS_ICON="✅"
          fi

          MENTION="<@1340666940615823451>"

          curl -X POST -H 'Content-Type: application/json' \
            --data "{
              \"content\": \"${MENTION}\",
              \"embeds\": [{
                \"title\": \"${TITLE}\",
                \"description\": \"${DESCRIPTION}\\n\\n[📋 詳細ログを確認](${LOG_URL})\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"ステータス\", \"value\": \"${STATUS_ICON} ${{ steps.status.outputs.status }}\", \"inline\": true},
                  {\"name\": \"実行時刻\", \"value\": \"${CURRENT_TIME}\", \"inline\": true},
                  {\"name\": \"トリガー\", \"value\": \"${{ github.event_name }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Run ID: ${{ github.run_id }}\"}
              }]
            }" \
            $DISCORD_WEBHOOK_URL

      - name: Output Summary
        if: always()
        run: |
          echo "## Zoom Processing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.status.outputs.status }}" == "failure" ]; then
            echo "❌ **一部の処理でエラーが発生しました**" >> $GITHUB_STEP_SUMMARY
            echo "- 失敗: ${{ steps.status.outputs.failed_jobs }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **すべての処理が正常に完了しました**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 実行時刻: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- トリガー: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- [詳細ログを確認](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
