# Zoom動画 Google Driveアップロード（自動）
# シートのZoomリンクをチェックし、Driveにアップロードされていない動画を自動アップロード
name: Zoom Drive Upload

on:
  schedule:
    # 毎時0分に実行（1時間おき）
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: '処理件数上限（デフォルト: 5）'
        required: false
        type: number
        default: 5

concurrency:
  group: zoom-drive-upload
  cancel-in-progress: false

env:
  TZ: 'Asia/Tokyo'

jobs:
  upload:
    name: Upload Videos to Drive
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            zoom
            .github
          sparse-checkout-cone-mode: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('zoom/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r zoom/requirements.txt

      - name: Setup Google Credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          umask 077
          if printf '%s' "$GOOGLE_CREDENTIALS_JSON" | base64 -d > /tmp/google_creds.json 2>/dev/null; then
            echo "Credentials decoded from base64."
          else
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" > /tmp/google_creds.json
            echo "Credentials saved as raw JSON."
          fi
          chmod 600 /tmp/google_creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_creds.json" >> $GITHUB_ENV

      - name: Upload videos to Google Drive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          SHARED_DRIVE_ID: ${{ secrets.SHARED_DRIVE_ID }}
          GOOGLE_DELEGATE_EMAIL: ${{ secrets.GOOGLE_DELEGATE_EMAIL }}
          PYTHONUNBUFFERED: "1"
        run: |
          LIMIT="${{ inputs.limit || '5' }}"
          echo "=== Zoom動画Driveアップロード limit=${LIMIT} ==="
          python zoom/batch_zoom.py --upload-videos-to-drive --limit "$LIMIT"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/google_creds.json

  notify:
    name: Notify Results
    needs: upload
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LOG_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CURRENT_TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')
          MENTION="<@1340666940615823451>"

          if [ "${{ needs.upload.result }}" == "success" ]; then
            TITLE="Drive Upload"
            DESCRIPTION="Zoom動画のDriveアップロードが完了しました。"
            COLOR=3066993
          elif [ "${{ needs.upload.result }}" == "failure" ]; then
            TITLE="Drive Upload Error"
            DESCRIPTION="Driveアップロード処理でエラーが発生しました。次回実行で自動リトライされます。"
            COLOR=15158332
          else
            TITLE="Drive Upload Skip"
            DESCRIPTION="アップロード対象がありませんでした。"
            COLOR=8421504
          fi

          curl -X POST -H 'Content-Type: application/json' \
            --data "{
              \"content\": \"${MENTION}\",
              \"embeds\": [{
                \"title\": \"${TITLE}\",
                \"description\": \"${DESCRIPTION}\\n\\n[Details](${LOG_URL})\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"Time\", \"value\": \"${CURRENT_TIME}\", \"inline\": true},
                  {\"name\": \"Trigger\", \"value\": \"${{ github.event_name }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Run ID: ${{ github.run_id }}\"}
              }]
            }" \
            $DISCORD_WEBHOOK_URL
